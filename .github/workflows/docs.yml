name: 📚 TypeDoc 文档生成与部署

on:
  push:
    branches:
      - main
    paths:
      - 'packages/core/src/**'
      - 'packages/core/typedoc.json'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 配置 PNPM 环境
        uses: pnpm/action-setup@v6

      - name: 📦 安装项目依赖
        run: pnpm install

      - name: 📚 生成 TypeDoc 文档
        run: pnpm run types-docs:build

      - name: 🔍 检查生成的文档
        run: |
          DOCS_DIR="packages/core/type-docs"
          if [ ! -d "$DOCS_DIR" ]; then
            echo "❌ 文档目录不存在！"
            exit 1
          fi

          if [ ! -f "$DOCS_DIR/index.html" ]; then
            echo "❌ 文档入口文件不存在！"
            exit 1
          fi

          echo "✅ 文档生成验证通过"
          echo "� 生成的录文件数量: $(find $DOCS_DIR -type f | wc -l)"
          echo "📁 文档目录大小: $(du -sh $DOCS_DIR | cut -f1)"

      - name: 🚀 部署到 docs 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./packages/core/type-docs
          publish_branch: docs
          force_orphan: true
          commit_message: '📚 自动更新文档 - ${{ github.sha }}'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: 📊 生成部署报告
        run: |
          echo "## 📚 文档部署成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### � 访问链]接" >> $GITHUB_STEP_SUMMARY
          echo "- [🌐 GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 统计信息" >> $GITHUB_STEP_SUMMARY
          echo "- **提交哈希:** \`$(git rev-parse --short HEAD)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **生成时间:** \`$(date '+%Y-%m-%d %H:%M:%S') (UTC)\`" >> $GITHUB_STEP_SUMMARY
