name: CI/CD

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: '运行模式'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      
      manual_version:
        description: '手动指定版本号 (如: 6.0.0，仅生产模式有效)'
        required: false
        type: string
      
      release_notes:
        description: '发布说明 (可选)'
        required: false
        type: string
      
      force_npm_publish:
        description: '强制发布到 NPM (仅生产模式)'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths-ignore:
      - 'packages/docs/**'
  pull_request:
    types: [opened, reopened, synchronize]
    paths-ignore:
      - 'packages/docs/**'

env:
  APP_NAME: amagi

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write
  issues: write

jobs:
  version-release:
    runs-on: ubuntu-latest
    needs: [unified-build]
    if: |
      needs.unified-build.outputs.build_success == 'true' &&
      github.event_name != 'pull_request'
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created || steps.manual-release.outputs.releases_created }}
      core_release_created: ${{ steps.release-please.outputs['packages/core--release_created'] || steps.manual-release.outputs.core_release_created }}
      core_tag_name: ${{ steps.release-please.outputs['packages/core--tag_name'] || steps.manual-release.outputs.core_tag_name }}
      core_version: ${{ steps.get-version-info.outputs.core_version }}
      should_upload_release: ${{ steps.get-version-info.outputs.should_upload_release }}
      release_tag_name: ${{ steps.get-version-info.outputs.release_tag_name }}
      is_manual_production: ${{ steps.get-version-info.outputs.is_manual_production }}
      manual_release_notes: ${{ steps.get-version-info.outputs.manual_release_notes }}

    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 执行版本发布检查
        if: github.event_name != 'workflow_dispatch' || inputs.run_mode != 'production'
        id: release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: 🎯 处理手动生产发布
        if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production'
        id: manual-release
        run: |
          if [ -z "${{ inputs.manual_version }}" ]; then
            echo "❌ 生产模式必须指定版本号" >&2
            exit 1
          fi
          
          if ! echo "${{ inputs.manual_version }}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+(-[a-zA-Z]+\.[0-9]+)?$'; then
            echo "❌ 版本号格式错误，应为 x.y.z 或 x.y.z-prerelease.n 格式" >&2
            exit 1
          fi
          
          echo "releases_created=true" >> $GITHUB_OUTPUT
          echo "core_release_created=true" >> $GITHUB_OUTPUT
          echo "core_tag_name=v${{ inputs.manual_version }}" >> $GITHUB_OUTPUT
          
          echo "✅ 手动生产发布已配置：v${{ inputs.manual_version }}"

      - name: 🏷️ 获取版本信息
        id: get-version-info
        run: |
          cd packages/core
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.run_mode }}" = "production" ]; then
            npm version ${{ inputs.manual_version }} --no-git-tag-version
            CORE_VERSION="${{ inputs.manual_version }}"
            echo "should_upload_release=true" >> $GITHUB_OUTPUT
            echo "release_tag_name=v${{ inputs.manual_version }}" >> $GITHUB_OUTPUT
            echo "is_manual_production=true" >> $GITHUB_OUTPUT
            echo "manual_release_notes=${{ inputs.release_notes }}" >> $GITHUB_OUTPUT
            echo "🎯 手动生产模式：版本 $CORE_VERSION"
          else
            CORE_VERSION=$(node -p "require('./package.json').version")
            echo "is_manual_production=false" >> $GITHUB_OUTPUT
            echo "manual_release_notes=" >> $GITHUB_OUTPUT
            
            if [ "${{ steps.release-please.outputs.core_release_created }}" = "true" ] || [ "${{ inputs.force_npm_publish }}" = "true" ]; then
              echo "should_upload_release=true" >> $GITHUB_OUTPUT
              echo "release_tag_name=${{ steps.release-please.outputs.core_tag_name }}" >> $GITHUB_OUTPUT
            else
              echo "should_upload_release=false" >> $GITHUB_OUTPUT
              echo "release_tag_name=" >> $GITHUB_OUTPUT
            fi
          fi
          
          echo "core_version=$CORE_VERSION" >> $GITHUB_OUTPUT
          echo "📦 当前版本：$CORE_VERSION"

  unified-build:
    runs-on: ubuntu-latest
    outputs:
      build_success: ${{ steps.build-status.outputs.success }}
      package_name: ${{ steps.package-info.outputs.name }}
      package_short_name: ${{ steps.package-info.outputs.short_name }}
      commit_hash: ${{ steps.git-info.outputs.commit_hash }}
      short_commit_hash: ${{ steps.git-info.outputs.short_commit_hash }}
    
    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 配置 PNPM 环境
        uses: pnpm/action-setup@v4

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 📦 安装依赖
        run: pnpm install

      - name: 🔨 执行完整项目构建
        run: |
          echo "开始构建所有包..."
          pnpm build:core
          if [ $? -ne 0 ]; then
            echo "❌ 构建失败，退出工作流"
            exit 1
          fi
          echo "✅ 构建成功"

      - name: 🏷️ 获取包信息
        id: package-info
        working-directory: packages/core
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_SHORT_NAME=$(basename "$PACKAGE_NAME")
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "short_name=$PACKAGE_SHORT_NAME" >> $GITHUB_OUTPUT

      - name: 📊 获取 Git 信息
        id: git-info
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          SHORT_COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT
          echo "short_commit_hash=$SHORT_COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: 🎯 应用手动版本号（仅生产模式）
        if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production'
        run: |
          cd packages/core
          npm version ${{ inputs.manual_version }} --no-git-tag-version
          echo "✅ 已应用手动版本号：${{ inputs.manual_version }}"

      - name: 📦 准备发布产物 (正式版)
        if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production'
        run: |
          cd packages/core
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));delete pkg.devDependencies;delete pkg.scripts;fs.writeFileSync('package.json',JSON.stringify(pkg,null,2));"
          mkdir -p ${{ runner.temp }}/production/
          cp -r package.json README.md CHANGELOG.md LICENSE dist ${{ runner.temp }}/production/

      - name: 📦 准备预览包产物
        if: github.event_name != 'workflow_dispatch' || inputs.run_mode != 'production'
        run: |
          cd packages/core
          mkdir -p ${{ runner.temp }}/preview/
          cp -r package.json README.md CHANGELOG.md LICENSE dist ${{ runner.temp }}/preview/

      - name: 📤 上传正式版构建产物
        if: github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: ${{ runner.temp }}/production/

      - name: 📤 上传预览包产物
        if: github.event_name != 'workflow_dispatch' || inputs.run_mode != 'production'
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: ${{ runner.temp }}/preview/

      - name: ✅ 标记构建状态
        id: build-status
        run: echo "success=true" >> $GITHUB_OUTPUT

  npm-production-publish:
    runs-on: ubuntu-latest
    needs: [version-release, unified-build]
    if: |
      needs.unified-build.outputs.build_success == 'true' && (
        needs.version-release.outputs.core_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production') ||
        inputs.force_npm_publish == true
      )
    permissions:
      contents: write
      id-token: write
    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: packages/core

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: ⏫ 升级 npm 版本
        run: npm install -g npm@latest

      - name: 🚀 发布到 NPM 官方源
        id: publish-to-npm
        working-directory: packages/core
        run: |
          pnpm publish --no-git-checks --provenance
          
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 📊 生成发布报告
        run: |
          echo "## 📦 NPM 发布成功" >> $GITHUB_STEP_SUMMARY
          echo "- **包名:** \`${{ steps.publish-to-npm.outputs.name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **版本:** \`${{ steps.publish-to-npm.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **模式:** ${{ github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production' && '🎯 手动生产发布' || '🤖 自动发布' }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.version-release.outputs.manual_release_notes }}" != "" ]; then
            echo "- **发布说明:** ${{ needs.version-release.outputs.manual_release_notes }}" >> $GITHUB_STEP_SUMMARY
          fi

  github-package-publish:
    runs-on: ubuntu-latest
    needs: [version-release, unified-build]
    permissions:
      contents: read
      packages: write
    if: |
      needs.unified-build.outputs.build_success == 'true' && (
        needs.version-release.outputs.core_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.run_mode == 'production') ||
        inputs.force_npm_publish == true
      )
    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: packages/core

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://npm.pkg.github.com'

      - name: ✏️ 修改包名 (添加 Scope)
        working-directory: packages/core
        run: |
          ORIGINAL_NAME=$(node -p "require('./package.json').name")
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$ORIGINAL_NAME" != @* ]]; then
            NEW_NAME="@$OWNER/$ORIGINAL_NAME"
          else
            NEW_NAME="$ORIGINAL_NAME"
          fi
          
          echo "📦 修改包名: $ORIGINAL_NAME -> $NEW_NAME"
          
          node -e "
            const fs = require('fs');
            const pkg = require('./package.json');
            pkg.name = '$NEW_NAME';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com/' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: 🚀 发布到 GitHub Packages
        working-directory: packages/core
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 生成发布报告
        run: |
          echo "## 📦 GitHub Packages 发布成功" >> $GITHUB_STEP_SUMMARY
          PKG_NAME=$(node -p "require('./packages/core/package.json').name")
          VERSION=$(node -p "require('./packages/core/package.json').version")
          
          echo "- **包名:** \`$PKG_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **版本:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY

  preview-package-publish:
    runs-on: ubuntu-latest
    needs: [unified-build]
    permissions:
      pull-requests: write
    if: needs.unified-build.outputs.build_success == 'true' && (github.event_name != 'workflow_dispatch' || inputs.run_mode != 'production')
    outputs:
      pkg_version: ${{ steps.version-gen.outputs.version }}
    
    steps:
      - name: 📥 检出源代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 配置 PNPM 环境
        uses: pnpm/action-setup@v4

      - name: 🟢 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: packages/core

      - name: 🏷️ 生成符合SemVer的预览版本号
        id: version-gen
        working-directory: packages/core
        run: |
          set -e
          PKG_VERSION=$(node -p "require('./package.json').version")
          BASE_CLEAN=$(echo "$PKG_VERSION" | sed 's/-.*$//')
          MAJOR=$(echo "$BASE_CLEAN" | cut -d. -f1)
          MINOR=$(echo "$BASE_CLEAN" | cut -d. -f2)
          PATCH=$(echo "$BASE_CLEAN" | cut -d. -f3)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMITS=$(git log --no-merges --pretty=%s HEAD ^origin/main)
          else
            COMMITS=$(git log --no-merges --pretty=%s HEAD)
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -E 'BREAKING CHANGE|^.*!:' >/dev/null; then
            BUMP="major"
          elif echo "$COMMITS" | grep -E '^feat(\(.+\))?:' >/dev/null; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          BASE_NEXT="${MAJOR}.${MINOR}.${PATCH}"
          TIMESTAMP=$(TZ='Asia/Shanghai' date +%Y%m%d%H%M%S)
          COMMIT_SHORT=${{ needs.unified-build.outputs.short_commit_hash }}

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NEW_VERSION="${BASE_NEXT}-alpha.${{ github.event.number }}.${TIMESTAMP}.${COMMIT_SHORT}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            NEW_VERSION="${BASE_NEXT}-beta.${TIMESTAMP}.${COMMIT_SHORT}"
          else
            NEW_VERSION="${BASE_NEXT}-dev.${TIMESTAMP}.${COMMIT_SHORT}"
          fi

          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2));
          "
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: 🚀 发布预览包
        id: publish_pkg
        working-directory: packages/core
        run: |
          npx --yes pkg-pr-new publish --json output.json --comment=update --commentWithSha --compact --packageManager=pnpm > pkg-output.txt

  pr-summary:
    runs-on: ubuntu-latest
    needs: [unified-build, preview-package-publish]
    if: needs.unified-build.outputs.build_success == 'true'
    steps:
      - name: 📊 生成PR构建摘要
        run: |
          echo "# 🚀 PR 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- 预览版本: \`${{ needs.preview-package-publish.outputs.pkg_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 安装: \`pnpm add ${{ needs.preview-package-publish.outputs.pkg_version }}\`" >> $GITHUB_STEP_SUMMARY

  main-push-summary:
    runs-on: ubuntu-latest
    needs: [unified-build, preview-package-publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 📊 生成main分支推送摘要
        run: |
          echo "# 🚀 Main 分支构建完成" >> $GITHUB_STEP_SUMMARY
          echo "- 预览版本: \`${{ needs.preview-package-publish.outputs.pkg_version }}\`" >> $GITHUB_STEP_SUMMARY
